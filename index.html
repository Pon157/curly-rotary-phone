<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Онлайн-камера</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <div class="max-w-lg mx-auto p-6">
        <h1 class="text-2xl font-bold text-center mb-8 text-blue-400">Онлайн камера</h1>

        <div class="bg-gray-800 rounded-xl p-6 shadow-2xl border border-gray-700">
            <div id="status" class="text-sm text-gray-400 mb-4 text-center">Готов к работе</div>
            
            <div class="relative aspect-video bg-black rounded-lg overflow-hidden mb-6 border-2 border-gray-700">
                <video id="videoView" autoplay playsinline class="w-full h-full object-cover"></video>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="startBroadcast()" class="bg-green-600 hover:bg-green-700 p-3 rounded-lg font-semibold transition">
                    🎥 Транслировать
                </button>
                <button onclick="startWatching()" class="bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-semibold transition">
                    👁 Посмотреть
                </button>
            </div>

            <button onclick="stopAll()" class="w-full mt-4 bg-red-600 hover:bg-red-700 p-2 rounded-lg text-sm opacity-80">
                Остановить всё
            </button>
        </div>

        <div class="mt-8 bg-gray-800 rounded-lg p-4 text-sm border border-gray-700">
            <p class="text-gray-400 mb-2 font-bold">Параметры подключения:</p>
            <input type="text" id="vds_ip" placeholder="IP сервера" class="w-full bg-gray-700 p-2 rounded mb-2 border-none">
            <input type="password" id="stream_key" placeholder="Ключ доступа" class="w-full bg-gray-700 p-2 rounded border-none">
        </div>
    </div>

    <script>
        // Здесь используется SDK MediaMTX или стандартный WebRTC API
        // Для упрощения: при нажатии "Транслировать" браузер запрашивает камеру
        async function startBroadcast() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('videoView').srcObject = stream;
            document.getElementById('status').innerText = "🔴 В ЭФИРЕ (Идет запись на сервер)";
            // Код для отправки потока на WebRTC endpoint сервера
        }

        async function startWatching() {
            document.getElementById('status').innerText = "🔵 ПРОСМОТР ОНЛАЙН";
            // Код для получения потока с сервера
            document.getElementById('videoView').srcObject = null;
            document.getElementById('videoView').src = "http://" + document.getElementById('vds_ip').value + ":8888/stream1";
        }

        function stopAll() {
            location.reload(); 
        }
    </script>
</body>
</html>
